name: Feature Request
description: Suggest something new
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: e.g. "I want to target developers in a specific country..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Any alternatives you've considered?
    validations:
      required: false
