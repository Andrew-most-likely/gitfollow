name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: dropdown
    id: method
    attributes:
      label: How are you running GitFollow?
      options:
        - GitFollow.exe (downloaded release)
        - python gui.py (from source)
        - python gitfollow.py (headless)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. v2.3.1
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include any error messages from the Output log.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 22.04
    validations:
      required: true
