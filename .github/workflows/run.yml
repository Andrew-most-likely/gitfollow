name: GitFollow

on:
  schedule:
    # Runs once per day at 09:00 UTC — adjust to your liking
    # GitHub Actions free tier: unlimited minutes on public repos
    - cron: "0 9 * * *"
  workflow_dispatch:        # Also lets you trigger manually from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit state.json back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GitFollow
        env:
          GH_TOKEN:       ${{ secrets.GH_TOKEN }}
          GH_USERNAME:    ${{ secrets.GH_USERNAME }}
          FOLLOW_LIMIT:   ${{ vars.FOLLOW_LIMIT || '400' }}
          UNFOLLOW_HOURS: ${{ vars.UNFOLLOW_HOURS || '24' }}
          WHITELIST:      ${{ secrets.WHITELIST }}           # optional
        run: python gitfollow.py

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "chore: update follow state [skip ci]"
          git push
