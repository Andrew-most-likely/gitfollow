name: Build Windows Exe

on:
  workflow_dispatch:       # Run manually from the Actions tab any time
  push:
    tags:
      - "v*"               # Also runs automatically when you push a tag like v1.0

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name GitFollow
          --add-data "gitfollow.py;."
          gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitFollow-windows
          path: dist/GitFollow.exe
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GitFollow.exe

      - name: Clean up old releases and tags
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_tag="${GITHUB_REF_NAME}"
          echo "Keeping: $current_tag"

          # Pass 1: delete every GitHub Release except the current one.
          # --cleanup-tag removes the associated git tag at the same time.
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName \
            --jq '.[].tagName' | while read -r tag; do
            if [ "$tag" != "$current_tag" ]; then
              echo "Deleting release + tag: $tag"
              gh release delete "$tag" --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true
            fi
          done

          # Pass 2: delete any remaining git tags that had no release attached.
          gh api "repos/${{ github.repository }}/git/refs/tags" --paginate \
            --jq '.[].ref' | while read -r ref; do
            tag="${ref#refs/tags/}"
            if [ "$tag" != "$current_tag" ]; then
              echo "Deleting orphan tag: $tag"
              gh api --method DELETE "repos/${{ github.repository }}/git/refs/tags/$tag" 2>/dev/null || true
            fi
          done
