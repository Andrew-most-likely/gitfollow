name: Build Windows Exe

on:
  workflow_dispatch:       # Run manually from the Actions tab any time
  push:
    tags:
      - "v*"               # Also runs automatically when you push a tag like v1.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name GitFollow
          --add-data "gitfollow.py;."
          gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitFollow-windows
          path: dist/GitFollow.exe
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GitFollow.exe
